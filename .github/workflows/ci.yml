name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Check OpenAPI contract
        run: npm run openapi:check

      - name: Build C#/.NET implementation
        run: npm run dotnet:build

      - name: Test C#/.NET implementation
        run: npm run dotnet:test
